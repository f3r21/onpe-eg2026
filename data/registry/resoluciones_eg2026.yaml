# Registry curado de resoluciones oficiales del proceso EG2026 (primera vuelta).
#
# Fuente: Diario Oficial El Peruano (diariooficial.elperuano.pe).
# Cada entrada es un dispositivo con su op-ID del buscador
# (busquedas.elperuano.pe/dispositivo/NL/{op}).
#
# Campos:
#   - op                 → ID único en El Peruano (obligatorio)
#   - tag_proceso        → "EG2026" | "EG2026_PRIMARIAS" | "EG2026_EXTERIOR" | "EG2026_MESAS"
#   - tag_categoria      → "cronograma" | "padron" | "reglamento" | "miembros_mesa" |
#                          "voto_digital" | "observacion" | "reglamento_primarias" |
#                          "cedula" | "JEE" | "otros"
#   - notas              → descripción del curador (por qué es importante, contexto)
#
# Los otros campos (fecha, sumilla, urls) los hidrata el scraper desde El Peruano.
# Si el scraper no puede obtener metadata en vivo, los fields opcionales
# (fecha_publicacion, institucion, tipo_dispositivo, nombre_dispositivo, sumilla)
# se usan como fallback para preservar la traza del registry.

resoluciones:
  # ── Cronograma + reglamentos del proceso general ──────────────────────────

  - op: "2388220-1"
    tag_proceso: "EG2026"
    tag_categoria: "cronograma"
    fecha_publicacion: "2025-04-07"
    institucion: "JNE"
    tipo_dispositivo: "RESOLUCION"
    nombre_dispositivo: "N° 0126-2025-JNE"
    sumilla: "Aprueban el cronograma electoral para el proceso de Elecciones Generales 2026"
    notas: >-
      Landmark: cronograma oficial del proceso EG2026. Define fechas de cierre de
      padrón, inscripción de candidatos, campaña, elección, observación, proclamación.

  # ── Elecciones primarias (Agosto 2025) ────────────────────────────────────

  - op: "2391947-1"
    tag_proceso: "EG2026_PRIMARIAS"
    tag_categoria: "reglamento_primarias"
    fecha_publicacion: "2025-04-22"
    institucion: "ONPE"
    tipo_dispositivo: "RESOLUCION JEFATURAL"
    nombre_dispositivo: "N° 000063-2025-JN/ONPE"
    sumilla: >-
      Aprueban Reglamento de Elecciones Primarias de las Organizaciones Políticas
      en el Ámbito de las Elecciones Generales 2026
    notas: >-
      Define modalidades (abiertas / cerradas / con delegados), reglas de votación
      intra-partido usadas para generar las listas EG2026.

  - op: "2391963-1"
    tag_proceso: "EG2026_PRIMARIAS"
    tag_categoria: "reglamento_primarias"
    fecha_publicacion: "2025-04-22"
    institucion: "JNE"
    tipo_dispositivo: "RESOLUCION"
    nombre_dispositivo: "Nº 163-2025-JNE"
    sumilla: >-
      Aprueban el Reglamento sobre las Competencias del Jurado Nacional de Elecciones
      en las Elecciones Primarias para las Elecciones Generales 2026
    notas: >-
      Complementario al 000063-2025-JN/ONPE. Define jurisdicción JNE en disputas
      del proceso primario.

  # ── Voto digital / inclusión ──────────────────────────────────────────────

  - op: "2395263-1"
    tag_proceso: "EG2026"
    tag_categoria: "voto_digital"
    fecha_publicacion: "2025-05-14"
    institucion: "ONPE"
    tipo_dispositivo: "RESOLUCION JEFATURAL"
    nombre_dispositivo: "N° 000069-2025-JN/ONPE"
    sumilla: >-
      Establecen inclusión de grupos prioritarios para la aplicación del voto digital
      en las Elecciones Generales 2026
    notas: >-
      Identifica los grupos (adultos mayores, discapacidad, embarazadas) a los
      que se asigna voto digital en las mesas habilitadas.

  # ── Miembros de mesa (exterior) ──────────────────────────────────────────

  - op: "2488852-1"
    tag_proceso: "EG2026_EXTERIOR"
    tag_categoria: "miembros_mesa"
    fecha_publicacion: "2026-02-21"
    institucion: "ONPE"
    tipo_dispositivo: "RESOLUCION JEFATURAL"
    nombre_dispositivo: "N° 000029-2026-JN/ONPE"
    sumilla: >-
      Disponen la exoneración del pago del derecho de trámite y de la presentación
      del comprobante correspondiente en procedimientos administrativos denominados
      "Excusa al cargo de miembro de mesa" y "Justificación a la inasistencia al cargo
      de miembro de mesa", previstos en el TUPA-ONPE, para ciudadanos peruanos
      residentes en el extranjero sorteados como miembros de mesa en las Elecciones
      Generales 2026
    notas: >-
      Relevante para analizar la tasa de instalación de mesas exterior (DE 27).
      Cruzar con las 48 mesas "no instaladas" del ámbito exterior identificadas en
      scripts/investigate_anomaly_240.py.

  # ── Padrón RENIEC ─────────────────────────────────────────────────────────

  - op: "2447328-1"
    tag_proceso: "EG2026"
    tag_categoria: "padron"
    institucion: "RENIEC"
    tipo_dispositivo: "RESOLUCION JEFATURAL"
    sumilla: >-
      Disponen el cierre del Padrón Electoral para efecto del desarrollo de las
      Elecciones Generales 2026 y dictan otras disposiciones
    notas: >-
      Define la fecha de corte del padrón usado en EG2026. Base del total de
      27,356,578 electores de referencia (ver data/dim/padron.parquet, Q1 2026).

  - op: "2501055-1"
    tag_proceso: "EG2026"
    tag_categoria: "padron"
    fecha_publicacion: "2026-03-23"
    institucion: "RENIEC"
    tipo_dispositivo: "RESOLUCION JEFATURAL"
    nombre_dispositivo: "N° 000039-2026/JNAC/RENIEC"
    sumilla: >-
      Admiten el Documento Nacional de Identidad - DNI de menor de edad, para los
      efectos de sufragar en las Elecciones Generales 2026, a realizarse el día
      domingo 12 de abril de 2026
    notas: >-
      Permite a ciudadanos que cumplen 18 años hasta la fecha de la elección
      sufragar con DNI de menor. Impacta el padrón hábil real de EG2026.
